function reducer(state, action) {
  switch (action.type) {
    case 'SET': return { ...state, ...action.p };
    case 'TOGGLE_PRODUCT': {
      const sp = state.selectedProducts;
      return { ...state, selectedProducts: sp.includes(action.v) ? sp.filter(x => x !== action.v) : [...sp, action.v] };
    }
    case 'TOGGLE_OUTCOME': {
      const so = state.selectedOutcomes;
      return { ...state, selectedOutcomes: so.includes(action.id) ? so.filter(x => x !== action.id) : [...so, action.id] };
    }
    case 'DRAFT_PLAN': {
      const seen = new Set();
      const ids = [];
      state.selectedOutcomes.forEach(oid => {
        const o = OUTCOMES.find(o => o.id === oid);
        if (!o) return;
        o.criteriaIds.forEach(cid => {
          const c = CRITERIA.find(c => c.id === cid);
          const match = state.selectedProducts.length === 0 || state.selectedProducts.includes(c && c.product);
          if (!seen.has(cid) && match) { seen.add(cid); ids.push(cid); }
        });
      });
      return { ...state, planCriteria: ids, step: 1 };
    }
    case 'TOGGLE_CRITERION': {
      const pl = state.planCriteria;
      return { ...state, planCriteria: pl.includes(action.id) ? pl.filter(x => x !== action.id) : [...pl, action.id] };
    }
    case 'REMOVE_CRITERION': return { ...state, planCriteria: state.planCriteria.filter(x => x !== action.id) };
    case 'MOVE_CRITERION': {
      const pl = [...state.planCriteria];
      const i = pl.indexOf(action.id);
      const ni = action.dir === 'up' ? i - 1 : i + 1;
      if (i < 0 || ni < 0 || ni >= pl.length) return state;
      [pl[i], pl[ni]] = [pl[ni], pl[i]];
      return { ...state, planCriteria: pl };
    }
    case 'EDIT_CRITERION': {
      const { id, field, value } = action;
      return { ...state, criteriaEdits: { ...state.criteriaEdits, [id]: { ...state.criteriaEdits[id], [field]: value } } };
    }
    case 'ADD_CUSTOM': {
      const nc = { ...action.criterion, id: 'CUSTOM-' + (customIdCounter++), isCustom: true };
      return { ...state, customCriteria: [...state.customCriteria, nc], planCriteria: [...state.planCriteria, nc.id], showAddCriterionModal: false };
    }
    case 'DELETE_CUSTOM': return {
      ...state,
      customCriteria: state.customCriteria.filter(c => c.id !== action.id),
      planCriteria: state.planCriteria.filter(x => x !== action.id),
    };
    case 'UPDATE_TRACKING': {
      const { id, field, value } = action;
      return { ...state, trackingData: { ...state.trackingData, [id]: { ...state.trackingData[id], [field]: value } } };
    }
    case 'ADD_ACTION': {
      const maxId = state.actionItems.reduce((m, a) => Math.max(m, a.id), 0);
      return { ...state, actionItems: [...state.actionItems, { id: maxId + 1, task: '', owner: '', dueDate: '', priority: 'Medium', status: 'Not Started' }] };
    }
    case 'UPDATE_ACTION': {
      return { ...state, actionItems: state.actionItems.map(a => a.id === action.id ? { ...a, [action.field]: action.value } : a) };
    }
    case 'DELETE_ACTION': return { ...state, actionItems: state.actionItems.filter(a => a.id !== action.id) };
    case 'ADD_MILESTONE': {
      const maxId = state.milestones.reduce((m, x) => Math.max(m, x.id || 0), 0);
      const n = state.milestones.length + 1;
      return { ...state, milestones: [...state.milestones, { id: maxId + 1, week: 'Week ' + n, activity: '' }] };
    }
    case 'REMOVE_MILESTONE': return { ...state, milestones: state.milestones.filter(m => m.id !== action.id) };
    case 'UPDATE_MILESTONE': return { ...state, milestones: state.milestones.map(m => m.id === action.id ? { ...m, [action.field]: action.value } : m) };
    case 'ADD_DRIVER': {
      var maxDId = (state.driverItems||[]).reduce(function(m,x){ return Math.max(m,x.id||0); }, 0);
      return { ...state, driverItems: [...(state.driverItems||[]), { id: maxDId+1, text: action.text }] };
    }
    case 'REMOVE_DRIVER': return { ...state, driverItems: (state.driverItems||[]).filter(function(d){ return d.id !== action.id; }) };
    case 'ADD_RISK': {
      const maxId = state.riskItems.reduce((m, x) => Math.max(m, x.id || 0), 0);
      return { ...state, riskItems: [...state.riskItems, { id: maxId + 1, text: action.text }] };
    }
    case 'REMOVE_RISK': return { ...state, riskItems: state.riskItems.filter(r => r.id !== action.id) };
    case 'ADD_LOG_ENTRY': {
      const entry = { id: Date.now(), date: new Date().toISOString(), title: action.title || '', text: action.text };
      return { ...state, updateLog: [entry, ...state.updateLog] };
    }
    case 'DELETE_LOG_ENTRY': return { ...state, updateLog: state.updateLog.filter(e => e.id !== action.id) };
    case 'RESET': return { ...initialState };
    default: return state;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function qualScore(s) {
  return s.scoreExecutive * 4 + s.scoreUseCase * 4 + s.scoreUrgency * 3 +
         s.scoreCompetition * 3 + s.scoreReadiness * 3 + s.scoreAlignment * 3;
}
function getCriterion(state, id) {
  const base = state.customCriteria.find(c => c.id === id) || CRITERIA.find(c => c.id === id);
  if (!base) return null;
  const e = state.criteriaEdits[id] || {};
  return { ...base,
    requirement:     e.requirement     != null ? e.requirement     : base.requirement,
    businessProblem: e.businessProblem != null ? e.businessProblem : base.businessProblem,
    successCriteria: e.successCriteria != null ? e.successCriteria : base.successCriteria,
    measurement:     e.measurement     != null ? e.measurement     : base.measurement,
    competitiveEdge: e.competitiveEdge != null ? e.competitiveEdge : base.competitiveEdge,
  };
}
function getPlanCriteria(state) {
  return state.planCriteria.map(id => getCriterion(state, id)).filter(Boolean);
}

function savePoV(state, dispatch) {
  const parts = (state.saveVersion || '1.0').split('.');
  const newVersion = parts[0] + '.' + (parseInt(parts[1] || '0', 10) + 1);
  const newState = { ...state, saveVersion: newVersion };
  const stateJson = JSON.stringify(newState);
  let html = document.documentElement.outerHTML;
  html = html.replace(
    /(<script[^>]*id="pov-state"[^>]*>)([\s\S]*?)(<\/script>)/,
    function(m, open, _content, close) { return open + stateJson + close; }
  );
  const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const name = (state.customerName || 'PoV').replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'PoV';
  a.href = url;
  a.download = name + '_v' + newVersion + '.html';
  a.click();
  URL.revokeObjectURL(url);
  dispatch({ type: 'SET', p: { saveVersion: newVersion } });
}

// ── Word export (executive summary) ───────────────────────────────────────────
function exportWord(state) {
  const criteria = getPlanCriteria(state);
  const score = qualScore(state);
  const selOutcomes = OUTCOMES.filter(o => state.selectedOutcomes.includes(o.id));
  const validated = criteria.filter(c => (state.trackingData[c.id] || {}).status === 'Validated');
  const activeCriteria = criteria.filter(c => { const s = (state.trackingData[c.id] || {}).status; return s && s !== 'Not Started'; });
  const pct = criteria.length > 0 ? Math.round(validated.length / criteria.length * 100) : 0;
  const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');

  const glanceRows = [
    ['PoV Period', (state.povStartDate || '—') + ' to ' + (state.povEndDate || '—')],
    ['Products Evaluated', state.selectedProducts.join(', ') || '—'],
    ['Outcomes Selected', selOutcomes.length + ''],
    ['Criteria Tested', activeCriteria.length + ' of ' + criteria.length],
    ['Criteria Validated', validated.length + ' of ' + criteria.length + ' (' + pct + '%)'],
    ['Readiness Score', score + ' / 100 — ' + (score >= 70 ? 'Ready to proceed' : 'Under review')],
  ].map(([k, v]) => '<tr><td style="font-weight:600;color:#475569;width:160pt;padding:4pt 8pt;border:1px solid #e2e8f0">' + k + '</td><td style="padding:4pt 8pt;border:1px solid #e2e8f0">' + v + '</td></tr>').join('');

  const outcomeSections = selOutcomes.map(o => {
    const valCount = o.criteriaIds.filter(cid => (state.trackingData[cid] || {}).status === 'Validated').length;
    const planCount = o.criteriaIds.filter(cid => criteria.find(c => c.id === cid)).length;
    return '<div style="margin-bottom:10pt;padding:8pt;background:#f8fafc;border-left:3pt solid #0049BD;border-radius:2pt">' +
      '<strong>' + esc(o.title) + '</strong><br>' +
      '<span style="color:#64748b;font-size:10pt">' + esc(o.description) + '</span>' +
      (planCount > 0 ? '<br><span style="color:#059669;font-weight:600;font-size:10pt">' + valCount + ' / ' + planCount + ' criteria validated</span>' : '') +
      '</div>';
  }).join('');

  const statusColor = { Validated: '#059669', Blocked: '#d97706', Failed: '#dc2626', 'In Progress': '#3b82f6', 'Not Started': '#64748b' };
  const resultsRows = activeCriteria.map(c => {
    const t = state.trackingData[c.id] || {};
    return '<tr>' +
      '<td style="padding:4pt 6pt;border:1px solid #e2e8f0"><strong>' + esc(c.requirement) + '</strong><br><small style="color:#94a3b8">' + esc(c.product) + '</small></td>' +
      '<td style="padding:4pt 6pt;border:1px solid #e2e8f0">' + esc(c.successCriteria) + '</td>' +
      '<td style="padding:4pt 6pt;border:1px solid #e2e8f0">' + esc(t.findings || '') + '</td>' +
      '<td style="padding:4pt 6pt;border:1px solid #e2e8f0;color:' + (statusColor[t.status] || '#64748b') + ';font-weight:600">' + esc(t.status || 'Not Started') + '</td>' +
      '</tr>';
  }).join('');

  const allRows = criteria.map((c, i) => {
    const t = state.trackingData[c.id] || {};
    return '<tr>' +
      '<td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:8pt">' + (i + 1) + '</td>' +
      '<td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:8pt">' + esc(c.product) + '</td>' +
      '<td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:8pt">' + esc(c.requirement) + '</td>' +
      '<td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:8pt;color:' + (statusColor[t.status] || '#64748b') + '">' + esc(t.status || '') + '</td>' +
      '</tr>';
  }).join('');

  const openActions = state.actionItems.filter(a => a.status !== 'Done');
  const actionRows = openActions.map(a => '<tr><td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:9pt">' + esc(a.task) + '</td><td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:9pt">' + esc(a.owner) + '</td><td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:9pt">' + esc(a.dueDate) + '</td><td style="padding:3pt 5pt;border:1px solid #e2e8f0;font-size:9pt">' + esc(a.priority) + '</td></tr>').join('');

  const html = "<!DOCTYPE html>" +
    "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>" +
    "<head><meta charset='utf-8'><title>Sophos PoV Executive Summary</title>" +
    "<style>body{font-family:Calibri,Arial,sans-serif;margin:2cm;color:#1e293b;font-size:11pt}" +
    "h1{font-size:22pt;color:#0B1F3A;border-bottom:2px solid #0049BD;padding-bottom:6pt;margin-bottom:4pt}" +
    "h2{font-size:13pt;color:#0B1F3A;border-bottom:1px solid #e2e8f0;padding-bottom:3pt;margin-top:18pt}" +
    "h3{font-size:11pt;color:#0049BD;margin-top:12pt}" +
    "table{border-collapse:collapse;width:100%;margin:8pt 0}" +
    "th{background:#0B1F3A;color:white;padding:5pt 6pt;text-align:left;font-size:9pt}" +
    "p{margin:4pt 0;line-height:1.5}" +
    ".foot{color:#94a3b8;font-size:8pt;border-top:1px solid #e2e8f0;margin-top:20pt;padding-top:4pt}</style></head><body>" +
    "<h1>Sophos Proof of Value — Executive Summary</h1>" +
    "<p style='font-size:10pt;color:#64748b'>" + esc(state.customerName) + (state.customerIndustry ? ' · ' + esc(state.customerIndustry) : '') + " &nbsp;|&nbsp; Sophos Contact: " + esc(state.salesEngineer) + " &nbsp;|&nbsp; " + new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'}) + "</p>" +
    "<h2>Evaluation at a Glance</h2><table>" + glanceRows + "</table>" +
    ((state.driverItems||[]).length || state.businessDrivers ? "<h2>Business Context &amp; Goals</h2>" +
      ((state.driverItems||[]).length ? "<ul style='margin:4pt 0;padding-left:18pt'>" + (state.driverItems||[]).map(function(d){ return "<li style='margin-bottom:3pt'>" + esc(d.text) + "</li>"; }).join('') + "</ul>" : '') +
      (state.businessDrivers ? "<p style='margin-top:6pt'>" + esc(state.businessDrivers) + "</p>" : '') : '') +
    (selOutcomes.length ? "<h2>Business Outcomes</h2>" + outcomeSections : '') +
    (activeCriteria.length ? "<h2>Criteria Results</h2><table><thead><tr><th>Requirement</th><th>Success Criteria</th><th>Evidence</th><th>Status</th></tr></thead><tbody>" + resultsRows + "</tbody></table>" : '') +
    (state.outcomeSummary ? "<h2>Key Findings</h2><p>" + esc(state.outcomeSummary) + "</p>" : '') +
    (state.riskItems && state.riskItems.length ? "<h2>Assumptions &amp; Mitigations</h2><p>• " + state.riskItems.map(r => esc(r.text)).join('<br>• ') + "</p>" : '') +
    (state.nextSteps ? "<h2>Next Steps</h2><p>" + esc(state.nextSteps) + "</p>" : '') +
    (openActions.length ? "<h2>Agreed Actions</h2><table><thead><tr><th>Task</th><th>Owner</th><th>Due</th><th>Priority</th></tr></thead><tbody>" + actionRows + "</tbody></table>" : '') +
    (criteria.length ? "<h2 style='page-break-before:always'>Appendix — Full Criteria Detail</h2><table><thead><tr><th>#</th><th>Product</th><th>Requirement</th><th>Status</th></tr></thead><tbody>" + allRows + "</tbody></table>" : '') +
    "<p class='foot'>Generated " + new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'}) + " | Sophos Proof of Value v" + state.saveVersion + "</p>" +
    "</body></html>";

  const blob = new Blob([html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.customerName || 'Sophos').replace(/\s+/g, '_') + '_PoV_Summary.doc';
  a.click();
  URL.revokeObjectURL(url);
}

// ── JSON deck export ────────────────────────────────────────────────────────
async function exportPPTX(state) {
  var criteria = getPlanCriteria(state);
  var score = qualScore(state);
  var selOutcomes = OUTCOMES.filter(function(o){ return state.selectedOutcomes.includes(o.id); });
  var validated = criteria.filter(function(c){ return (state.trackingData[c.id]||{}).status==='Validated'; });
  var inProgress = criteria.filter(function(c){ return (state.trackingData[c.id]||{}).status==='In Progress'; });
  var blocked = criteria.filter(function(c){ return (state.trackingData[c.id]||{}).status==='Blocked'; });
  var failed = criteria.filter(function(c){ return (state.trackingData[c.id]||{}).status==='Failed'; });
  var pct = criteria.length>0 ? Math.round(validated.length/criteria.length*100) : 0;

  var data = {
    _format: 'Sophos PoV Deck JSON v1.0 — use with python-pptx, Google Apps Script, or any PPTX automation tool',
    metadata: {
      customer: state.customerName || '',
      industry: state.customerIndustry || '',
      sophosContact: state.salesEngineer || '',
      partner: state.partnerName || '',
      executiveSponsor: state.executiveSponsor || '',
      estimatedValue: state.opportunityValue || '',
      period: { start: state.povStartDate || '', end: state.povEndDate || '' },
      exportDate: new Date().toISOString(),
      readinessScore: score,
      recommendation: score >= 70 ? 'Ready to proceed' : 'Under review'
    },
    summary: {
      businessDrivers: (state.driverItems||[]).map(function(d){ return d.text; }),
      additionalContext: state.businessDrivers || '',
      productsEvaluated: state.selectedProducts,
      outcomesSelected: selOutcomes.length,
      criteriaTotal: criteria.length,
      criteriaValidated: validated.length,
      criteriaInProgress: inProgress.length,
      criteriaBlocked: blocked.length,
      criteriaFailed: failed.length,
      percentValidated: pct,
      outcomeSummary: state.outcomeSummary || '',
      nextSteps: state.nextSteps || ''
    },
    objectives: selOutcomes.map(function(o) {
      var vc = o.criteriaIds.filter(function(cid){ return (state.trackingData[cid]||{}).status==='Validated'; }).length;
      var pc = o.criteriaIds.filter(function(cid){ return criteria.find(function(c){ return c.id===cid; }); }).length;
      return { title: o.title, description: o.description, criteriaInPlan: pc, criteriaValidated: vc };
    }),
    criteria: criteria.map(function(c) {
      var t = state.trackingData[c.id] || {};
      return { id: c.id, product: c.product, requirement: c.requirement, successCriteria: c.successCriteria, measurement: c.measurement, status: t.status || 'Not Started', findings: t.findings || '', owner: t.owner || '' };
    }),
    actions: state.actionItems.map(function(a) {
      return { task: a.task, owner: a.owner, dueDate: a.dueDate, priority: a.priority, status: a.status };
    }),
    progressNotes: state.updateLog.map(function(e) {
      return { date: e.date, title: e.title || '', text: e.text };
    }),
    assumptions: (state.riskItems||[]).map(function(r){ return r.text; }),
    milestones: state.milestones.map(function(m){ return { phase: m.week, activity: m.activity }; }),
    slides: [
      { slideNumber: 1, type: 'title', title: 'Sophos Proof of Value', subtitle: state.customerName || 'Customer',
        notes: ['Sophos Contact: '+(state.salesEngineer||''), state.partnerName?'Partner: '+state.partnerName:'', new Date().toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'})].filter(Boolean).join('  •  ') },
      { slideNumber: 2, type: 'overview', title: 'Evaluation Overview',
        content: { period: (state.povStartDate||'—')+' to '+(state.povEndDate||'—'), products: state.selectedProducts.join(', ')||'—', readinessScore: score, recommendation: score>=70?'Ready to proceed':'Under review', validatedSummary: validated.length+' / '+criteria.length+' ('+pct+'%)' } },
      { slideNumber: 3, type: 'objectives', title: 'Evaluation Objectives',
        content: selOutcomes.map(function(o){ return o.title; }) },
      { slideNumber: 4, type: 'results', title: 'Results: What Was Validated',
        content: { validated: validated.map(function(c){ return c.requirement; }), issues: blocked.concat(failed).map(function(c){ return { requirement: c.requirement, status: (state.trackingData[c.id]||{}).status||'' }; }) } },
      { slideNumber: 5, type: 'findings', title: 'Key Findings & Business Value',
        content: { metrics: [pct+'% of success criteria validated', validated.length+' scenario'+(validated.length!==1?'s':'')+' proven in-environment', state.selectedProducts.length+' Sophos solution'+(state.selectedProducts.length!==1?'s':'')+' evaluated'], summary: state.outcomeSummary||'' } },
      { slideNumber: 6, type: 'next_steps', title: 'Next Steps',
        content: { text: state.nextSteps||'', actions: state.actionItems.filter(function(a){ return a.status!=='Done'; }).slice(0,6).map(function(a){ return { task: a.task, owner: a.owner, dueDate: a.dueDate }; }) } }
    ]
  };

  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (state.customerName||'Sophos').replace(/\s+/g,'_')+'_PoV_Deck.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, wide = false }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40"
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide ? 'max-w-3xl' : 'max-w-lg'} max-h-[90vh] flex flex-col`}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-bold text-slate-900">{title}</h3>
          <button onClick={onClose} className="p-1 rounded hover:bg-slate-100"><Icon name="x" size={16}/></button>
        </div>
        <div className="overflow-y-auto flex-1 p-5">{children}</div>
      </div>
    </div>
  );
}

// ── Browse modal ───────────────────────────────────────────────────────────────
function BrowseModal({ state, dispatch }) {
  const [search, setSearch] = useState('');
  const [filterProd, setFilterProd] = useState(state.selectedProducts[0] || '');
  const products = useMemo(() => [...new Set(CRITERIA.map(c => c.product))], []);
  const filtered = useMemo(() => {
    let list = CRITERIA;
    if (filterProd) list = list.filter(c => c.product === filterProd);
    if (search.trim()) { const q = search.toLowerCase(); list = list.filter(c => c.requirement.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)); }
    return list;
  }, [search, filterProd]);
  const inp = 'border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400';
  return (
    <Modal title="Browse full criteria library" onClose={() => dispatch({type:'SET',p:{showBrowseModal:false}})} wide>
      <div className="flex gap-2 mb-3">
        <input className={`flex-1 ${inp}`} placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)} />
        <select className={`${inp} bg-white`} value={filterProd} onChange={e => setFilterProd(e.target.value)}>
          <option value="">All products</option>
          {products.map(p => <option key={p}>{p}</option>)}
        </select>
      </div>
      <div className="space-y-0.5">
        {filtered.map(c => {
          const inPlan = state.planCriteria.includes(c.id);
          return (
            <label key={c.id} className={`flex items-center gap-3 p-2.5 rounded-lg cursor-pointer hover:bg-slate-50 ${inPlan ? 'bg-blue-50' : ''}`}>
              <input type="checkbox" checked={inPlan} onChange={() => dispatch({type:'TOGGLE_CRITERION',id:c.id})}
                className="h-4 w-4 rounded border-slate-300 text-blue-600 shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-xs font-mono text-slate-400 shrink-0">{c.id}</span>
                  <span className="text-sm font-medium text-slate-800 truncate">{c.requirement}</span>
                  <span className="text-xs bg-slate-100 rounded px-1.5 shrink-0">{c.product}</span>
                </div>
                <p className="text-xs text-slate-500 truncate mt-0.5">{c.businessProblem}</p>
              </div>
            </label>
          );
        })}
      </div>
      <div className="mt-4 flex justify-between items-center pt-3 border-t border-slate-100">
        <span className="text-sm text-slate-500">{state.planCriteria.length} in plan</span>
        <button onClick={() => dispatch({type:'SET',p:{showBrowseModal:false}})}
          className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Done</button>
      </div>
    </Modal>
  );
}

// ── Add custom success criterion modal ─────────────────────────────────────────────────
function AddCriterionModal({ dispatch }) {
  const products = useMemo(() => [...new Set(CRITERIA.map(c => c.product))], []);
  const [form, setForm] = useState({ product:'XDR', requirement:'', businessProblem:'', successCriteria:'', measurement:'', competitiveEdge:'', edgeTags:[] });
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const toggleTag = t => setForm(f => ({...f, edgeTags: f.edgeTags.includes(t) ? f.edgeTags.filter(x=>x!==t) : [...f.edgeTags,t]}));
  const inp = 'w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400';
  return (
    <Modal title="Add custom success criterion" onClose={() => dispatch({type:'SET',p:{showAddCriterionModal:false}})} wide>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Product</label>
            <select className={inp} value={form.product} onChange={e => set('product', e.target.value)}>
              {products.map(p => <option key={p}>{p}</option>)}
              <option value="Custom">Custom</option>
            </select>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Requirement *</label>
            <input className={inp} placeholder="e.g. Custom detection authoring" value={form.requirement} onChange={e => set('requirement', e.target.value)} />
          </div>
        </div>
        {[['Business Problem','businessProblem','What pain does this address?'],['Success Criteria','successCriteria','What does success look like?'],['Measurement','measurement','How will you measure it?'],['Competitive Edge','competitiveEdge','Why does Sophos win here?']].map(([lbl,key,ph]) => (
          <div key={key}>
            <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">{lbl}</label>
            <textarea className={inp} rows={2} placeholder={ph} value={form[key]} onChange={e => set(key, e.target.value)} />
          </div>
        ))}
        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Edge Pillars</label>
          <div className="flex gap-2 flex-wrap">
            {['PLATFORM','NATIVE','INTEL','AGENTIC','PRICING'].map(t => (
              <button key={t} onClick={() => toggleTag(t)}
                className={`px-2.5 py-1 rounded-full border text-xs font-medium transition-all ${form.edgeTags.includes(t) ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-white text-slate-500 border-slate-300'}`}>
                {t}
              </button>
            ))}
          </div>
        </div>
        <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
          <button onClick={() => dispatch({type:'SET',p:{showAddCriterionModal:false}})}
            className="px-3 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50">Cancel</button>
          <button onClick={() => { if (form.requirement.trim()) dispatch({type:'ADD_CUSTOM',criterion:form}); }}
            disabled={!form.requirement.trim()}
            className="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-40">Add to plan</button>
        </div>
      </div>
    </Modal>
  );
}

    dispatch({ type: 'ADD_DRIVER', text: t });

  return (
    <div className="flex gap-2">

// ── Step 3: Run ────────────────────────────────────────────────────────────────

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const daysRemaining = state.povEndDate ? Math.max(0, Math.ceil((new Date(state.povEndDate) - today) / 86400000)) : null;
  const isComplete = validated === total && total > 0;

  const overallStatus = isComplete ? 'Complete' : isAtRisk ? 'At Risk' : 'On Track';
  const statusChipColor = isComplete ? 'bg-emerald-100 text-emerald-700' : isAtRisk ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';

  const inp = 'border border-slate-300 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white';

  return (
    <div className="space-y-5">

          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">End Date</label>
            <input type="date" value={state.povEndDate} onChange={e => dispatch({type:'SET',p:{povEndDate:e.target.value}})}
              className="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-slate-900 leading-none">{daysRemaining !== null ? daysRemaining : '—'}</div>
            <div className="text-xs text-slate-500 mt-1">days remaining</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-slate-900 leading-none">{pct}%</div>
            <div className="text-xs text-slate-500 mt-1">{validated}/{total} criteria validated</div>
            <span className={`inline-flex mt-2 px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusChipColor}`}>{overallStatus}</span>
          </div>
        </div>
        {total > 0 && (
          <div className="bg-slate-100 rounded-full h-2.5 overflow-hidden">
            <div className={`h-2.5 rounded-full transition-all ${isComplete ? 'bg-emerald-500' : isAtRisk ? 'bg-amber-500' : 'bg-blue-500'}`} style={{width: pct + '%'}}/>
          </div>
        )}
      </div>

      {/* Section B: Action items */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <h3 className="font-bold text-slate-800">Activities & Actions</h3>
          <div className="flex items-center gap-3">
            <span className="text-sm text-slate-500">{state.actionItems.filter(a => a.status === 'Done').length}/{state.actionItems.length} complete</span>
            <button onClick={() => dispatch({type:'ADD_ACTION'})}
              className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-900 text-white text-xs font-medium rounded-lg hover:bg-slate-700 transition-all">
              <Icon name="plus" size={12}/> Add
            </button>
          </div>
        </div>
        <div className="divide-y divide-slate-100">
          {state.actionItems.map(a => {
            const isDone = a.status === 'Done';
            const isOverdue = a.dueDate && new Date(a.dueDate) < today && !isDone;
            return (
              <div key={a.id} className={`flex items-center gap-3 px-4 py-3 ${isOverdue ? 'bg-amber-50' : isDone ? 'bg-slate-50/60' : ''}`}>
                <input type="checkbox" checked={isDone}
                  onChange={e => dispatch({type:'UPDATE_ACTION',id:a.id,field:'status',value:e.target.checked?'Done':'Not Started'})}
                  className="h-4 w-4 rounded border-slate-300 text-emerald-600 shrink-0"/>
                <input value={a.task} onChange={e => dispatch({type:'UPDATE_ACTION',id:a.id,field:'task',value:e.target.value})}
                  className={`flex-1 min-w-0 text-sm bg-transparent border-none outline-none ${isDone ? 'line-through text-slate-400' : 'text-slate-800'}`}
                  placeholder="Task description…"/>
                <input value={a.owner} onChange={e => dispatch({type:'UPDATE_ACTION',id:a.id,field:'owner',value:e.target.value})}
                  placeholder="Owner" className={`${inp} w-24 shrink-0`}/>
                <input type="date" value={a.dueDate} onChange={e => dispatch({type:'UPDATE_ACTION',id:a.id,field:'dueDate',value:e.target.value})}
                  className={`${inp} w-36 shrink-0 ${isOverdue ? 'text-amber-700 border-amber-300' : ''}`}/>
                <span className={`text-xs px-2 py-0.5 rounded-full border font-medium shrink-0 hidden md:inline ${priorityColor[a.priority] || priorityColor.Medium}`}>{a.priority}</span>
                <select value={a.status} onChange={e => dispatch({type:'UPDATE_ACTION',id:a.id,field:'status',value:e.target.value})}
                  className={`${inp} w-32 shrink-0`}>
                  {['Not Started','In Progress','Done','Blocked'].map(s => <option key={s}>{s}</option>)}
                </select>
                <button onClick={() => dispatch({type:'DELETE_ACTION',id:a.id})}
                  className="p-1 text-slate-300 hover:text-red-500 shrink-0 rounded hover:bg-red-50">
                  <Icon name="trash" size={13}/>
                </button>
              </div>
            );
          })}
        </div>
      </div>

      {/* Section C: Criteria tracking */}
      {total > 0 && (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div className="px-6 py-4 border-b border-slate-200">
            <h3 className="font-bold text-slate-800">Success Criteria Progress</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50">
                <tr>
                  {['Criteria','Product','Owner','Status','Evidence / Findings'].map(h => (
                    <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {criteria.map(c => {
                  const t = state.trackingData[c.id] || {};
                  const upd = (field, value) => dispatch({type:'UPDATE_TRACKING',id:c.id,field,value});
                  const sc = statusClasses[t.status || 'Not Started'] || statusClasses['Not Started'];
                  return (
                    <tr key={c.id} className="border-t border-slate-100 align-top">
                      <td className="px-4 py-3 min-w-[200px]">
                        <div className="font-medium text-slate-800 text-sm">{c.requirement}</div>
                        <div className="text-xs font-mono text-slate-400 mt-0.5">{c.id}</div>
                      </td>
                      <td className="px-4 py-3 whitespace-nowrap">
                        <span className="text-xs bg-slate-100 px-2 py-1 rounded">{c.product}</span>
                      </td>
                      <td className="px-4 py-3 min-w-[110px]">
                        <input value={t.owner||''} onChange={e => upd('owner',e.target.value)}
                          className={`${inp} w-full`} placeholder="Owner"/>
                      </td>
                      <td className="px-4 py-3">
                        <select value={t.status||'Not Started'} onChange={e => upd('status',e.target.value)}
                          className={`border rounded-lg px-2 py-1.5 text-xs font-medium focus:outline-none ${sc}`}>
                          {['Not Started','In Progress','Validated','Blocked','Failed'].map(s => <option key={s}>{s}</option>)}
                        </select>
                      </td>
                      <td className="px-4 py-3 min-w-[250px]">
                        <textarea rows={2} value={t.findings||''} onChange={e => upd('findings',e.target.value)}
                          placeholder="Evidence, test results, observations…"
                          className={`${inp} w-full resize-none`}/>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Section D: Update log */}
      <div className="bg-white rounded-2xl border border-slate-200 p-6">
        <h3 className="font-bold text-slate-800 mb-4">Progress Notes</h3>
        <div className="space-y-2 mb-4">
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Meeting or update title <span className="font-normal normal-case text-slate-400">(optional)</span></label>
            <input value={logTitle} onChange={e => setLogTitle(e.target.value)}
              placeholder="e.g. Week 1 customer call, Internal review…"
              className="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Notes</label>
            <div className="flex gap-2">
              <textarea rows={3} value={logNotes} onChange={e => setLogNotes(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); if (logNotes.trim()) { dispatch({type:'ADD_LOG_ENTRY',title:logTitle.trim(),text:logNotes.trim()}); setLogTitle(''); setLogNotes(''); } } }}
                placeholder="Progress, findings, blockers, decisions, actions… (Ctrl+Enter to save)"
                className="flex-1 rounded-xl border border-slate-300 px-4 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"/>
              <button
                onClick={() => { if (logNotes.trim()) { dispatch({type:'ADD_LOG_ENTRY',title:logTitle.trim(),text:logNotes.trim()}); setLogTitle(''); setLogNotes(''); } }}
                disabled={!logNotes.trim()}
                className="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-xl hover:bg-slate-700 disabled:opacity-40 self-end whitespace-nowrap">
                Log it
              </button>
            </div>
          </div>
        </div>
        {state.updateLog.length === 0 && <p className="text-sm text-slate-400 italic">No updates logged yet. Start capturing meeting notes after each call.</p>}
        <div className="space-y-3">
          {state.updateLog.map((entry, i) => {
            const prev = state.updateLog[i + 1];
            const dayGap = prev ? Math.floor((new Date(entry.date) - new Date(prev.date)) / 86400000) : 0;
            const dateStr = new Date(entry.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
            const timeStr = new Date(entry.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
            const copyText = (entry.title ? entry.title + '\n' : '') + entry.text;
            return (
              <div key={entry.id}>
                {dayGap > 0 && (
                  <div className="flex items-center gap-2 my-2">
                    <div className="flex-1 h-px bg-slate-200"/>
                    <span className="text-xs text-slate-400">{dayGap === 1 ? '1 day later' : dayGap + ' days later'}</span>
                    <div className="flex-1 h-px bg-slate-200"/>
                  </div>
                )}
                <div className="bg-slate-50 rounded-xl p-4">
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <div>
                      {entry.title && <p className="font-semibold text-slate-800 text-sm">{entry.title}</p>}
                      <p className="text-xs text-slate-400 font-mono">{dateStr} · {timeStr}</p>
                    </div>
                    <div className="flex gap-1 shrink-0">
                      <button onClick={() => { try { navigator.clipboard.writeText(copyText); } catch(e) { const ta = document.createElement('textarea'); ta.value = copyText; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } }}
                        title="Copy to clipboard"
                        className="p-1.5 text-slate-300 hover:text-blue-500 rounded hover:bg-blue-50 text-xs">
                        <Icon name="edit" size={13}/>
                      </button>
                      <button onClick={() => dispatch({type:'DELETE_LOG_ENTRY',id:entry.id})}
                        className="p-1.5 text-slate-300 hover:text-red-500 rounded hover:bg-red-50">
                        <Icon name="x" size={13}/>
                      </button>
                    </div>
                  </div>
                  <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{entry.text}</p>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Section E: Executive notes + Export */}
      <div className="bg-white rounded-2xl border border-slate-200 p-6">
        <h3 className="font-bold text-slate-800 mb-4">Summary & Next Steps</h3>
        <div className="grid md:grid-cols-2 gap-4">
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Outcome Summary</label>
            <textarea rows={6} value={state.outcomeSummary} onChange={e => dispatch({type:'SET',p:{outcomeSummary:e.target.value}})}
              placeholder="Summarise the key outcomes, improvements measured, and business value demonstrated"
              className="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Next Steps</label>
            <textarea rows={6} value={state.nextSteps} onChange={e => dispatch({type:'SET',p:{nextSteps:e.target.value}})}
              placeholder="Agreed next steps, rollout phases, and key decision dates"
              className="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
        </div>
      </div>

      <div className="bg-slate-900 rounded-2xl p-6 text-white">
        <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
          <div>
            <div className="text-xs uppercase tracking-widest text-slate-400 mb-1">Reports & Save</div>
            <h3 className="text-lg font-bold">Share Your Evaluation</h3>
            <p className="text-slate-400 text-sm mt-1">
              {validated}/{total} validated &nbsp;·&nbsp; {state.customerName || 'Customer'} &nbsp;·&nbsp; {new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'})}
            </p>
          </div>
          <div className="flex gap-3 flex-wrap">
            <button onClick={onExportWord}
              className="flex items-center gap-2 px-5 py-2.5 bg-white text-slate-900 font-semibold rounded-xl hover:bg-slate-100 transition-all text-sm">
              <Icon name="file-text" size={15}/> Word Summary
            </button>
            <button onClick={onExportPPTX} disabled={exporting}
              className="flex items-center gap-2 px-5 py-2.5 bg-blue-500 text-white font-semibold rounded-xl hover:bg-blue-400 transition-all text-sm disabled:opacity-60">
              <Icon name="download" size={15}/> {exporting ? 'Generating…' : 'Export Deck (JSON)'}
            </button>
            <button onClick={onSave}
              className="flex items-center gap-2 px-5 py-2.5 bg-emerald-500 text-white font-semibold rounded-xl hover:bg-emerald-400 transition-all text-sm">
              <Icon name="save" size={15}/> Save v{state.saveVersion}
            </button>
          </div>
        </div>
      </div>

      <div className="flex justify-between">
        <button onClick={() => dispatch({type:'SET',p:{step:1}})}
          className="flex items-center gap-2 px-5 py-2.5 border border-slate-300 text-slate-600 rounded-xl hover:bg-slate-50 text-sm">
          <Icon name="chevleft" size={15}/> Back to Criteria
        </button>
        <button onClick={() => { if (confirm('Start over? All data will be cleared.')) dispatch({type:'RESET'}); }}
          className="flex items-center gap-1.5 px-4 py-2.5 border border-red-200 text-red-500 rounded-xl hover:bg-red-50 text-sm">
          <Icon name="rotate-ccw" size={13}/> Start over
        </button>
      </div>
    </div>
  );
}

// ── Top nav ────────────────────────────────────────────────────────────────────────────
function TopNav({ state, dispatch, onSave }) {
  const steps = [
    {n:0,label:'Business Context',sub:'Details & readiness'},
    {n:1,label:'Success Criteria',sub:state.planCriteria.length + ' criteria'},
    {n:2,label:'Execute',sub:'Progress & reports'},
  ];
  return (
    <header className="bg-[#0B1F3A] text-white px-4 flex items-stretch justify-between sticky top-0 z-40 shadow-lg min-h-[56px]">
      <div className="flex items-center gap-3 py-3 shrink-0">
        <div className="w-8 h-8 bg-blue-500 rounded-xl flex items-center justify-center shrink-0">
          <Icon name="shield" size={16} className="text-white"/>
        </div>
        <div>
          <span className="font-bold text-sm">Sophos Proof of Value</span>
          {state.customerName && <span className="text-blue-300 text-xs ml-2">— {state.customerName}</span>}
        </div>
      </div>
      <div className="flex items-stretch">
        {steps.map(s => {
          const active = state.step === s.n;
          const done = state.step > s.n;
          return (
            <button key={s.n} onClick={() => dispatch({type:'SET',p:{step:s.n}})}
              className={`flex items-center gap-2 px-4 text-xs font-medium border-b-2 transition-all ${active ? 'border-blue-400 text-white bg-white/10' : 'border-transparent text-blue-300 hover:text-white hover:bg-white/5'}`}>
              <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${active ? 'bg-blue-500' : done ? 'bg-emerald-500' : 'bg-white/20'}`}>
                {done ? <Icon name="check" size={10}/> : s.n + 1}
              </span>
              <div className="hidden sm:block text-left">
                <div>{s.label}</div>
                <div className="opacity-60 font-normal">{s.sub}</div>
              </div>
            </button>
          );
        })}
      </div>
      <div className="flex items-center py-3 shrink-0">
        <button onClick={onSave} title={'Save v' + state.saveVersion}
          className="flex items-center gap-1.5 px-2.5 py-1.5 bg-emerald-600/20 border border-emerald-500/30 text-emerald-200 rounded-lg hover:bg-emerald-600/40 transition-all text-xs font-medium">
          <Icon name="save" size={13}/> <span className="hidden md:inline">Save v{state.saveVersion}</span>
        </button>
      </div>
    </header>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, null, () => {
    try {
      const el = document.getElementById('pov-state');
      const parsed = el ? JSON.parse(el.textContent) : null;
      if (parsed && typeof parsed === 'object') {
        return { ...initialState, ...parsed };
      }
    } catch(e) {}
    return initialState;
  });
  const [exporting, setExporting] = useState(false);
  const handlePPTX = async () => { setExporting(true); try { await exportPPTX(state); } finally { setExporting(false); } };
  const handleSave = () => savePoV(state, dispatch);
  return (
    <div className="min-h-screen flex flex-col">
      <TopNav state={state} dispatch={dispatch} onSave={handleSave}/>
      <main className="flex-1 max-w-5xl mx-auto w-full px-4 py-6">
        {state.step === 0 && <Step1 state={state} dispatch={dispatch}/>}
        {state.step === 1 && <Step2 state={state} dispatch={dispatch}/>}
        {state.step === 2 && <Step3 state={state} dispatch={dispatch}
          exporting={exporting} onExportWord={() => exportWord(state)}
          onExportPPTX={handlePPTX} onSave={handleSave}/>}
      </main>
      {state.showBrowseModal && <BrowseModal state={state} dispatch={dispatch}/>}
      {state.showAddCriterionModal && <AddCriterionModal dispatch={dispatch}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
